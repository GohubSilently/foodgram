volumes:
  pg_data:
  backend_static:
  frontend_static:
  media:

services:
  db:
    image: postgres:16.10
    env_file:
      - ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ../backend
    container_name: backend
    depends_on:
      - db
    env_file:
      - ../.env
    command:
      - /bin/sh
      - '-c'
      - '/app/entrypoint.sh'
    volumes:
      - backend_static:/backend_static
      - media:/app/media

  frontend:
    container_name: foodgram-front
    build: ../frontend
    depends_on:
      - backend
    command: cp -r /app/build/. /frontend_static/.
    volumes:
      - frontend_static:/frontend_static

  nginx:
    container_name: foodgram-proxy
    build: .
    depends_on:
      - backend
      - frontend
    volumes:
      - backend_static:/staticfiles/backend_static
      - frontend_static:/staticfiles/frontend_static
      - media:/media
    ports:
      - "80:8000"