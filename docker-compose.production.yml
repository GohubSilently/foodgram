volumes:
  pg_data:
  backend_static:
  frontend_static:
  media:

services:
  db:
    image: postgres:16.10
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: gohub1/foodgram_backend
    platform: linux/amd64
    container_name: foodgram_backend
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - backend_static:/backend_static
      - media:/app/media

  frontend:
    container_name: foodgram-frontend
    image: gohub1/foodgram_frontend
    platform: linux/amd64
    command: cp -r /app/build/. /frontend_static/.
    depends_on:
      - backend
    volumes:
      - frontend_static:/frontend_static

  nginx:
    container_name: foodgram-proxy
    image: gohub1/foodgram_proxy
    platform: linux/amd64
    depends_on:
      - backend
      - frontend
    volumes:
      - ./docs/:/usr/share/nginx/html/
      - backend_static:/staticfiles/backend_static
      - frontend_static:/staticfiles/frontend_static
      - media:/media
    ports:
      - 8000:80